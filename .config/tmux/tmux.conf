#------------------------------------------------------#
#  Setup Color For Terminal
#------------------------------------------------------#
set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -g status-style 'bg=#333333 fg=#5eacd3'
#------------------------------------------------------#
# Core Settings
#------------------------------------------------------#
set -s escape-time 0
set -g base-index 1
set -g renumber-windows on
set -g mouse off
#------------------------------------------------------#
# Prefix
#------------------------------------------------------#
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix
#------------------------------------------------------#
# Sessions
#------------------------------------------------------#
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind s command-prompt "new-session -s '%%'"
#------------------------------------------------------#
# Windows
#------------------------------------------------------#
bind c new-window -c "#{pane_current_path}"
bind -r ^ last-window
bind 1 run-shell 'tmux select-window -t :1 2>/dev/null || tmux new-window -t :1 -c "#{pane_current_path}"'
bind 2 run-shell 'tmux select-window -t :2 2>/dev/null || tmux new-window -t :2 -c "#{pane_current_path}"'
bind 3 run-shell 'tmux select-window -t :3 2>/dev/null || tmux new-window -t :3 -c "#{pane_current_path}"'
bind 4 run-shell 'tmux select-window -t :4 2>/dev/null || tmux new-window -t :4 -c "#{pane_current_path}"'
bind 5 run-shell 'tmux select-window -t :5 2>/dev/null || tmux new-window -t :5 -c "#{pane_current_path}"'
#------------------------------------------------------#
# Copy Mode (vi)
#------------------------------------------------------#
set-window-option -g mode-keys vi
bind -n C-v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
#------------------------------------------------------#
# Misc
#------------------------------------------------------#
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
